<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello, World!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1, #ff9ff3, #a29bfe);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ---------- Login screen ---------- */
    .login-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 2.5rem 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      width: min(90vw, 380px);
      text-align: center;
    }

    .login-card h2 {
      font-size: 1.6rem;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #ff6b6b, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-card p.subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .login-card label {
      display: block;
      text-align: left;
      font-size: 0.85rem;
      color: #444;
      margin: 0.75rem 0 0.35rem;
      font-weight: 600;
    }

    .login-card input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 2px solid #eaeaea;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-card input:focus {
      border-color: #a29bfe;
    }

    .login-card button {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.8rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6b6b, #a29bfe);
      box-shadow: 0 8px 20px rgba(162, 155, 254, 0.4);
      transition: transform 0.15s;
    }

    .login-card button:hover { transform: translateY(-2px); }
    .login-card button:active { transform: translateY(0); }

    .login-error {
      margin-top: 0.75rem;
      color: #e74c3c;
      font-size: 0.85rem;
      min-height: 1em;
    }

    /* ---------- Main stage (shown after login) ---------- */
    .stage {
      text-align: center;
      color: white;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
      user-select: none;
      display: none;
    }

    h1 {
      font-size: clamp(3rem, 12vw, 10rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      animation: bounce 2s ease-in-out infinite;
    }

    h1 span {
      display: inline-block;
      animation: wave 2.5s ease-in-out infinite;
    }

    h1 span:nth-child(1)  { animation-delay: 0.0s; }
    h1 span:nth-child(2)  { animation-delay: 0.1s; }
    h1 span:nth-child(3)  { animation-delay: 0.2s; }
    h1 span:nth-child(4)  { animation-delay: 0.3s; }
    h1 span:nth-child(5)  { animation-delay: 0.4s; }
    h1 span:nth-child(7)  { animation-delay: 0.6s; }
    h1 span:nth-child(8)  { animation-delay: 0.7s; }
    h1 span:nth-child(9)  { animation-delay: 0.8s; }
    h1 span:nth-child(10) { animation-delay: 0.9s; }
    h1 span:nth-child(11) { animation-delay: 1.0s; }
    h1 span:nth-child(12) { animation-delay: 1.1s; }

    @keyframes wave {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-20px) rotate(-5deg); }
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.05); }
    }

    .tagline {
      margin-top: 1rem;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 300;
      opacity: 0.95;
      letter-spacing: 0.1em;
    }

    .hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 0.9rem;
      opacity: 0.7;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .logout {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    .logout:hover { background: rgba(255,255,255,0.35); }

    .text-me {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      padding: 1rem 1.25rem;
      border-radius: 14px;
      display: none;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90vw;
    }

    .text-me input {
      border: 2px solid #eaeaea;
      border-radius: 8px;
      padding: 0.55rem 0.8rem;
      font-size: 0.95rem;
      outline: none;
      width: 180px;
    }

    .text-me input:focus { border-color: #a29bfe; }

    .text-me button {
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6b6b, #a29bfe);
      font-size: 0.95rem;
    }

    .text-me button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .text-me .status {
      flex-basis: 100%;
      text-align: center;
      font-size: 0.85rem;
      color: #555;
      min-height: 1em;
    }

    .text-me .status.ok    { color: #1dd1a1; }
    .text-me .status.err   { color: #e74c3c; }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <!-- Login -->
  <div class="login-card" id="loginCard">
    <h2>Welcome</h2>
    <p class="subtitle">Sign in to see the magic</p>
    <form id="loginForm" autocomplete="off">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autofocus />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" />

      <button type="submit">Sign in</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>

  <!-- Main content (hidden until login) -->
  <div class="stage" id="stage">
    <h1 aria-label="Hello World">
      <span>H</span><span>e</span><span>l</span><span>l</span><span>o</span>
      <span>&nbsp;</span>
      <span>W</span><span>o</span><span>r</span><span>l</span><span>d</span><span>!</span>
    </h1>
    <p class="tagline">made with a lot of color and a little bit of joy</p>
  </div>

  <button class="logout" id="logoutBtn" style="display:none">Sign out</button>

  <form class="text-me" id="textMeForm">
    <input id="phone" type="tel" inputmode="tel" placeholder="Your phone number" required />
    <button type="submit" id="textMeBtn">Text me</button>
    <div class="status" id="textMeStatus"></div>
  </form>

  <p class="hint" id="hint" style="display:none">click anywhere for confetti</p>

  <script>
    const USERS = { "Brendan": "pass" };
    const SESSION_KEY = "hello-world-auth";

    const loginCard = document.getElementById("loginCard");
    const stage     = document.getElementById("stage");
    const hint      = document.getElementById("hint");
    const logoutBtn = document.getElementById("logoutBtn");
    const errorEl   = document.getElementById("loginError");

    const textMeForm = document.getElementById("textMeForm");

    function showApp() {
      loginCard.style.display   = "none";
      stage.style.display       = "block";
      hint.style.display        = "block";
      logoutBtn.style.display   = "inline-block";
      textMeForm.style.display  = "flex";
    }

    function showLogin() {
      loginCard.style.display   = "block";
      stage.style.display       = "none";
      hint.style.display        = "none";
      logoutBtn.style.display   = "none";
      textMeForm.style.display  = "none";
      errorEl.textContent       = "";
    }

    if (sessionStorage.getItem(SESSION_KEY) === "yes") showApp();

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value;
      if (USERS[u] && USERS[u] === p) {
        sessionStorage.setItem(SESSION_KEY, "yes");
        errorEl.textContent = "";
        showApp();
      } else {
        errorEl.textContent = "Invalid username or password";
      }
    });

    logoutBtn.addEventListener("click", () => {
      sessionStorage.removeItem(SESSION_KEY);
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      showLogin();
    });

    // Text me — sends the page's main greeting to the typed phone number
    const textMeBtn    = document.getElementById("textMeBtn");
    const textMeStatus = document.getElementById("textMeStatus");

    textMeForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const phone = document.getElementById("phone").value.trim();
      textMeStatus.className = "status";
      textMeStatus.textContent = "Sending…";
      textMeBtn.disabled = true;
      try {
        const resp = await fetch("/api/text", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone, message: "Hello World!" }),
        });
        const json = await resp.json();
        if (json.success) {
          textMeStatus.className = "status ok";
          textMeStatus.textContent = "Sent! Check your phone.";
        } else {
          textMeStatus.className = "status err";
          textMeStatus.textContent = "Failed: " + (json.error || "unknown error");
        }
      } catch (err) {
        textMeStatus.className = "status err";
        textMeStatus.textContent = "Network error: " + err.message;
      } finally {
        textMeBtn.disabled = false;
      }
    });

    // Confetti — only when logged in
    const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#ff9ff3', '#a29bfe', '#ffeaa7', '#fd79a8'];
    document.addEventListener('click', (e) => {
      if (stage.style.display !== "block") return;
      if (e.target === logoutBtn) return;
      if (textMeForm.contains(e.target)) return;
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = e.clientX + 'px';
        piece.style.top  = e.clientY + 'px';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(piece);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 150 + Math.random() * 250;
        const dx = Math.cos(angle) * velocity;
        const dy = Math.sin(angle) * velocity;
        const duration = 800 + Math.random() * 600;

        piece.animate(
          [
            { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
            { transform: `translate(${dx}px, ${dy + 400}px) rotate(${Math.random()*720}deg)`, opacity: 0 }
          ],
          { duration, easing: 'cubic-bezier(0.2, 0.8, 0.3, 1)' }
        ).onfinish = () => piece.remove();
      }
    });
  </script>
</body>
</html>
