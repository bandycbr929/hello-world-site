<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello, World!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1, #ff9ff3, #a29bfe);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      cursor: pointer;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .stage {
      text-align: center;
      color: white;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
      user-select: none;
    }

    h1 {
      font-size: clamp(3rem, 12vw, 10rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      animation: bounce 2s ease-in-out infinite;
    }

    h1 span {
      display: inline-block;
      animation: wave 2.5s ease-in-out infinite;
    }

    h1 span:nth-child(1)  { animation-delay: 0.0s; color: #fff; }
    h1 span:nth-child(2)  { animation-delay: 0.1s; color: #fff; }
    h1 span:nth-child(3)  { animation-delay: 0.2s; color: #fff; }
    h1 span:nth-child(4)  { animation-delay: 0.3s; color: #fff; }
    h1 span:nth-child(5)  { animation-delay: 0.4s; color: #fff; }
    h1 span:nth-child(7)  { animation-delay: 0.6s; color: #fff; }
    h1 span:nth-child(8)  { animation-delay: 0.7s; color: #fff; }
    h1 span:nth-child(9)  { animation-delay: 0.8s; color: #fff; }
    h1 span:nth-child(10) { animation-delay: 0.9s; color: #fff; }
    h1 span:nth-child(11) { animation-delay: 1.0s; color: #fff; }
    h1 span:nth-child(12) { animation-delay: 1.1s; color: #fff; }

    @keyframes wave {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-20px) rotate(-5deg); }
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.05); }
    }

    .tagline {
      margin-top: 1rem;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 300;
      opacity: 0.95;
      letter-spacing: 0.1em;
    }

    .hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 0.9rem;
      opacity: 0.7;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="stage">
    <h1 aria-label="Hello World">
      <span>H</span><span>e</span><span>l</span><span>l</span><span>o</span>
      <span>&nbsp;</span>
      <span>W</span><span>o</span><span>r</span><span>l</span><span>d</span><span>!</span>
    </h1>
    <p class="tagline">made with a lot of color and a little bit of joy</p>
  </div>

  <p class="hint">click anywhere for confetti</p>

  <script>
    const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#ff9ff3', '#a29bfe', '#ffeaa7', '#fd79a8'];

    document.addEventListener('click', (e) => {
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = e.clientX + 'px';
        piece.style.top = e.clientY + 'px';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(piece);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 150 + Math.random() * 250;
        const dx = Math.cos(angle) * velocity;
        const dy = Math.sin(angle) * velocity;
        const duration = 800 + Math.random() * 600;

        piece.animate(
          [
            { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
            { transform: `translate(${dx}px, ${dy + 400}px) rotate(${Math.random()*720}deg)`, opacity: 0 }
          ],
          { duration, easing: 'cubic-bezier(0.2, 0.8, 0.3, 1)' }
        ).onfinish = () => piece.remove();
      }
    });
  </script>
</body>
</html>
